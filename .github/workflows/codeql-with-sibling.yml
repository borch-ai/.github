name: CodeQL (With Sibling)
# Reusable CodeQL workflow for Go repos that have a replace directive pointing
# to a sibling borch-ai repo (e.g. pithos → powerword). Both repos are checked
# out into parallel directories so the replace directive resolves correctly
# before the CodeQL manual build runs.
#
# Usage in caller:
#   jobs:
#     analyze-go:
#       uses: borch-ai/.github/.github/workflows/codeql-with-sibling.yml@main
#       secrets: inherit
#       with:
#         sibling-repo: borch-ai/powerword
#         sibling-path: powerword
#         repo-path: pithos

on:
  workflow_call:
    inputs:
      sibling-repo:
        description: "Full name of the sibling repo to check out (e.g. borch-ai/powerword)"
        type: string
        required: true
      sibling-path:
        description: "Local path to check out the sibling repo into (e.g. powerword)"
        type: string
        required: true
      repo-path:
        description: "Local path to check out this repo into (e.g. pithos)"
        type: string
        required: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ${{ inputs.repo-path }}

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout sibling (${{ inputs.sibling-repo }})
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.sibling-repo }}
          path: ${{ inputs.sibling-path }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ inputs.repo-path }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ inputs.repo-path }}/go.sum
            ${{ inputs.sibling-path }}/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: go
          build-mode: manual

      - name: Build
        working-directory: ${{ inputs.repo-path }}
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:go"
