name: Go CI (With Sibling)
# Reusable workflow for Go repos that have a replace directive pointing to a
# sibling borch-ai repo (e.g. pithos → powerword). Both repos are checked out
# into parallel directories so the replace directive resolves correctly.
#
# Usage in caller:
#   jobs:
#     ci:
#       uses: borch-ai/.github/.github/workflows/go-ci-with-sibling.yml@main
#       secrets: inherit
#       with:
#         sibling-repo: borch-ai/powerword
#         sibling-path: powerword

on:
  workflow_call:
    inputs:
      sibling-repo:
        description: "Full name of the sibling repo to check out (e.g. borch-ai/powerword)"
        type: string
        required: true
      sibling-path:
        description: "Local path to check out the sibling repo into (e.g. powerword)"
        type: string
        required: true
      repo-path:
        description: "Local path to check out this repo into (default: name of calling repo)"
        type: string
        required: true
      coverage-threshold:
        description: "Minimum unit test coverage percentage (default: 91)"
        type: number
        default: 91

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ${{ inputs.repo-path }}
          fetch-depth: 0

      - name: Move Git Directory to Root for Gitleaks
        run: |
          if [ "${{ inputs.repo-path }}" != "." ]; then
            mv ${{ inputs.repo-path }}/.git .git
          fi

      - name: Run Gitleaks
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          source: ${{ inputs.repo-path }}

      - name: Move Git Directory back to Repo Path
        if: always()
        run: |
          if [ "${{ inputs.repo-path }}" != "." ]; then
            mv .git ${{ inputs.repo-path }}/.git
          fi

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ${{ inputs.repo-path }}
          ignore_paths: node_modules

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "${{ inputs.repo-path }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Hadolint
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ inputs.repo-path }}/Dockerfile

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          file_or_dir: ${{ inputs.repo-path }}
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              brackets: disable
              comments: disable

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Sibling (${{ inputs.sibling-repo }})
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.sibling-repo }}
          path: ${{ inputs.sibling-path }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.repo-path }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ inputs.repo-path }}/go.sum
            ${{ inputs.sibling-path }}/go.sum

      - name: Install powerword
        run: |
          cd ${{ inputs.sibling-path }}
          go install ./cmd/powerword

      - name: Run Linter
        working-directory: ${{ inputs.repo-path }}
        run: make lint

  security-and-test:
    name: Security & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ${{ inputs.repo-path }}

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Sibling (${{ inputs.sibling-repo }})
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.sibling-repo }}
          path: ${{ inputs.sibling-path }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.repo-path }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ inputs.repo-path }}/go.sum
            ${{ inputs.sibling-path }}/go.sum

      - name: Check Dependency Tidy Hygiene
        working-directory: ${{ inputs.repo-path }}
        run: make tidy && git diff --exit-code go.mod go.sum

      - name: Run Vulnerability Scan
        working-directory: ${{ inputs.repo-path }}
        run: make vuln

      - name: Run Tests & Check Coverage
        working-directory: ${{ inputs.repo-path }}
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: make check-coverage

      - name: Compile Binary
        working-directory: ${{ inputs.repo-path }}
        run: make build
