name: Go CI (With Sibling)
# Reusable workflow for Go repos that have a replace directive pointing to a
# sibling borch-ai repo (e.g. pithos → powerword). Both repos are checked out
# into parallel directories so the replace directive resolves correctly.
#
# Usage in caller:
#   jobs:
#     ci:
#       uses: borch-ai/.github/.github/workflows/go-ci-with-sibling.yml@main
#       secrets: inherit
#       with:
#         sibling-repo: borch-ai/powerword
#         sibling-path: powerword

on:
  workflow_call:
    inputs:
      sibling-repo:
        description: "Full name of the sibling repo to check out (e.g. borch-ai/powerword)"
        type: string
        required: true
      sibling-path:
        description: "Local path to check out the sibling repo into (e.g. powerword)"
        type: string
        required: true
      repo-path:
        description: "Local path to check out this repo into (default: name of calling repo)"
        type: string
        required: true
      coverage-threshold:
        description: "Minimum unit test coverage percentage (default: 91)"
        type: number
        default: 91

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          path: ${{ inputs.repo-path }}
          fetch-depth: 0

      - name: Initialize Workspace Git Repo for Gitleaks
        # gitleaks-action runs in Docker and will attempt to git init if no .git exists,
        # which causes a stderr warning and crashes it. We initialize it here to prevent that.
        run: |
          git config --global init.defaultBranch main
          git init
          git add .

      - name: Run Gitleaks
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          source: ${{ inputs.repo-path }}

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ${{ inputs.repo-path }}
          ignore_paths: node_modules

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "${{ inputs.repo-path }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Hadolint
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.repo-path }}/Dockerfile

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ${{ inputs.repo-path }}
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              brackets: disable
              comments: disable

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Sibling (${{ inputs.sibling-repo }})
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.sibling-repo }}
          path: ${{ inputs.sibling-path }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.repo-path }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ inputs.repo-path }}/go.sum
            ${{ inputs.sibling-path }}/go.sum

      - name: Install powerword
        run: |
          cd ${{ inputs.sibling-path }}
          go install ./cmd/powerword

      - name: Run Linter
        working-directory: ${{ inputs.repo-path }}
        run: make lint

  security-and-test:
    name: Security & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          path: ${{ inputs.repo-path }}

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Sibling (${{ inputs.sibling-repo }})
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.sibling-repo }}
          path: ${{ inputs.sibling-path }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.repo-path }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ inputs.repo-path }}/go.sum
            ${{ inputs.sibling-path }}/go.sum

      - name: Check Dependency Tidy Hygiene
        working-directory: ${{ inputs.repo-path }}
        run: make tidy && git diff --exit-code go.mod go.sum

      - name: Run Vulnerability Scan
        working-directory: ${{ inputs.repo-path }}
        run: make vuln

      - name: Run Tests & Check Coverage
        working-directory: ${{ inputs.repo-path }}
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: make check-coverage

      - name: Compile Binary
        working-directory: ${{ inputs.repo-path }}
        run: make build

