name: OpenSSF Scorecard
# Reusable workflow for running OpenSSF Scorecard analysis on repositories.
# Usage in caller:
#   jobs:
#     scorecard:
#       uses: borch-ai/.github/.github/workflows/scorecard.yml@main
#       permissions:
#         security-events: write
#         id-token: write
#         contents: read
#         actions: read

on:
  workflow_call:

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
