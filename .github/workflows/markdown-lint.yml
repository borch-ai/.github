name: Lint Markdown Files
# Reusable workflow for linting markdown files across the borch-ai organization.
# Usage in caller:
#   jobs:
#     markdown-lint:
#       uses: borch-ai/.github/.github/workflows/markdown-lint.yml@main

on:
  workflow_call:
    inputs:
      globs:
        description: 'Glob patterns for files to lint'
        required: false
        type: string
        default: '**/*.md'

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Central Lint Configuration
        run: |
          if [ ! -f ".markdownlint.json" ]; then
            curl -sSLo .markdownlint.json "https://raw.githubusercontent.com/borch-ai/.github/main/.markdownlint.json"
          fi

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: ${{ inputs.globs }}
