name: Daedalus Ecosystem Scan

on:
  workflow_call:
    inputs:
      scan_level:
        description: 'Level of scan (basic, deep)'
        required: false
        default: 'basic'
        type: string
      go-version:
        description: 'Go version to use for running Daedalus'
        required: false
        default: '1.26.x'
        type: string

permissions:
  contents: read

jobs:
  analyze:
    name: Run Daedalus Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install Daedalus
        run: go install github.com/borch-ai/daedalus/cmd/daedalus@latest

      - name: Execute Daedalus Scan
        run: daedalus scan --level ${{ inputs.scan_level }} --report-only

      - name: Upload Health Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ecosystem-health-report
          path: daedalus-report.md
