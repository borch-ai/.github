name: Daedalus Ecosystem Scan

on:
  workflow_call:
    inputs:
      scan_level:
        description: 'Level of scan (basic, deep)'
        required: false
        default: 'basic'
        type: string
      go-version:
        description: 'Go version to use for running Daedalus'
        required: false
        default: '1.26.x'
        type: string

permissions:
  contents: read

jobs:
  analyze:
    name: Run Daedalus Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install Daedalus
        run: go install github.com/borch-ai/daedalus/cmd/daedalus@latest

      - name: Execute Daedalus Scan
        run: daedalus scan --level ${{ inputs.scan_level }} --report-only

      - name: Upload Health Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ecosystem-health-report
          path: daedalus-report.md
