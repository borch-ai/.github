name: CodeQL (Reusable)

on:
  workflow_call:
    inputs:
      language:
        description: "Language to analyze (supported: c-cpp, csharp, go, java-kotlin, javascript-typescript, python, ruby, swift)"
        type: string
        default: "go"
      build-mode:
        description: "Build mode to use (autobuild, manual, none)"
        type: string
        default: "autobuild"
      build-command:
        description: "Custom build command to compile code (only used if build-mode is set to manual)"
        type: string
        required: false

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate language input
        run: |
          ALLOWED="c-cpp csharp go java-kotlin javascript-typescript python ruby swift"
          VALID=false
          for lang in $ALLOWED; do
            if [ "$lang" = "${{ inputs.language }}" ]; then
              VALID=true
              break
            fi
          done
          if [ "$VALID" = "false" ]; then
            echo "::error::Unsupported language '${{ inputs.language }}'. Must be one of: $ALLOWED"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Set up Go with automatic dependency caching
      - name: Set up Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # Initialize CodeQL tools for PRs (standard query suite for speed)
      - name: Initialize CodeQL (PR)
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ inputs.language }}
          build-mode: ${{ inputs.build-mode }}

      # Initialize CodeQL tools for pushes and schedules (complete/extended query suite)
      - name: Initialize CodeQL (Push/Schedule)
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ inputs.language }}
          queries: security-extended
          build-mode: ${{ inputs.build-mode }}

      # Compile code automatically using Autobuild (if build-mode is autobuild)
      - name: Autobuild
        if: ${{ inputs.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

      # Compile code using custom build command (if build-mode is manual)
      - name: Custom Build
        if: ${{ inputs.build-mode == 'manual' && inputs.build-command }}
        run: ${{ inputs.build-command }}

      # Perform the analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ inputs.language }}"
