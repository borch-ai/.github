name: CodeQL (Reusable)

on:
  workflow_call:
    inputs:
      language:
        description: "Language to analyze"
        type: string
        default: "go"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Go with automatic dependency caching
      - name: Set up Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # Initialize CodeQL tools
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          # Standard queries for fast review execution
          queries: security-auditing

      # Compile code automatically
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Perform the analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"
