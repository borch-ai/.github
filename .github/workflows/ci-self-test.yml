name: CI Self-Test
# Validates the workflows and scripts in this repository itself.
# Runs yamllint over all workflow files and actionlint to catch structural errors.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  lint-workflows:
    name: Lint Workflow Files
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Yamllint on Workflows
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          file_or_dir: .github/workflows
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              brackets: disable
              comments: disable

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          version: 1.7.7

  pr-title:
    name: Validate PR Title
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-title.yml

  pr-description:
    name: Validate PR Description
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/pr-description.yml

  markdown-lint:
    name: Lint Markdown Files
    uses: ./.github/workflows/markdown-lint.yml

  markdown-link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@3c3b66f1f7d0900e37b71eca45b63ea9eedfce31 # v1.0.17
        with:
          use-quiet-mode: 'yes'

  gitleaks:
    name: Scan Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  budget-auditor:
    name: Audit Token Budget
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/powerword-budget-auditor.yml
    secrets: inherit
    permissions:
      pull-requests: write
      issues: write
      contents: read
    with:
      pr-number: ${{ github.event.pull_request.number }}
