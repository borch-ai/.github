name: CI Self-Test
# Validates the workflows and scripts in this repository itself.
# Runs yamllint over all workflow files and actionlint to catch structural errors.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'

permissions:
  contents: read

jobs:
  lint-workflows:
    name: Lint Workflow Files
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Yamllint on Workflows
        uses: ibiqlik/action-yamllint@ae1abb2821b567e96742aa776f7b62c9b6a26bc8 # v3
        with:
          file_or_dir: .github/workflows
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              brackets: disable
              comments: disable

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint -color .github/workflows/*.yml
