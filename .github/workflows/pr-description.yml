name: Validate PR Description
# Reusable workflow for enforcing PR description format against the borch-ai template.
# Usage in caller:
#   jobs:
#     pr-description:
#       uses: borch-ai/.github/.github/workflows/pr-description.yml@main

on:
  workflow_call:
    inputs:
      template_path:
        description: 'Path to the PR template file to validate against'
        required: false
        type: string
        default: '.github/pull_request_template.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-description:
    name: Validate PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check PR Body for Required Headings
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          TEMPLATE_PATH: ${{ inputs.template_path }}
        run: |
          if [[ -z "$PR_BODY" ]]; then
            echo "::error::PR body is empty. Please follow the PR template."
            exit 1
          fi

          if [[ ! -f "$TEMPLATE_PATH" ]]; then
            echo "::warning::PR template not found at $TEMPLATE_PATH. Skipping format validation."
            exit 0
          fi

          # Dynamically extract all markdown headings (lines starting with '## ', '### ', etc. or just '## ')
          # Let's specifically target '## ' or any level of headings if you prefer,
          # but sticking to '## ' matches standard templates best.
          mapfile -t REQUIRED_HEADINGS < <(grep '^#\{1,\} ' "$TEMPLATE_PATH")

          if [[ ${#REQUIRED_HEADINGS[@]} -eq 0 ]]; then
            echo "::warning::No markdown headings found in $TEMPLATE_PATH. Skipping validation."
            exit 0
          fi

          MISSING_HEADINGS=0
          for heading in "${REQUIRED_HEADINGS[@]}"; do
            # strict match to start of line, removing any hidden carriage returns
            clean_heading=$(echo "$heading" | tr -d '\r')
            if ! echo "$PR_BODY" | tr -d '\r' | grep -q "^${clean_heading}"; then
              echo "::error::Missing required heading in PR description: ${heading}"
              MISSING_HEADINGS=1
            fi
          done

          if [ $MISSING_HEADINGS -ne 0 ]; then
            echo "::error::PR description does not match the required template format. Ensure it contains the headings from $TEMPLATE_PATH."
            exit 1
          fi

          echo "PR description format is valid."
