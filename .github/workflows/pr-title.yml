name: Validate PR Title
# Reusable workflow for enforcing Conventional Commits PR title format.
# Usage in caller:
#   jobs:
#     pr-title:
#       uses: borch-ai/.github/.github/workflows/pr-title.yml@main
#       secrets: inherit

on:
  workflow_call:

permissions:
  statuses: write
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Semantic PR Check
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
