name: Validate PR Title
# Reusable workflow for enforcing Conventional Commits PR title format.
# Usage in caller:
#   jobs:
#     pr-title:
#       uses: borch-ai/.github/.github/workflows/pr-title.yml@main
#       secrets: inherit

on:
  workflow_call:

permissions:
  statuses: write
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block

      - name: Semantic PR Check
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
