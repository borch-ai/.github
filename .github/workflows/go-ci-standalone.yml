name: Go CI (Standalone)
# Reusable workflow for Go repos with no sibling replace directives.
# Usage in caller:
#   jobs:
#     ci:
#       uses: borch-ai/.github/.github/workflows/go-ci-standalone.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      coverage-threshold:
        description: "Minimum unit test coverage percentage (default: 91)"
        type: number
        default: 91

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    env:
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_paths: node_modules

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore-no-dockerfile: true

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate GitHub App Token
        # Skipped when secrets are unavailable (e.g. Dependabot PRs).
        # Repos that build the linter from source (e.g. powerword itself) do
        # not need this step — make lint runs `go run ./cmd/powerword lint-go`.
        if: env.CI_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure Git for Private Modules
        if: env.CI_APP_ID != ''
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install powerword
        if: env.CI_APP_ID != ''
        run: GOPRIVATE=github.com/borch-ai/* go install github.com/borch-ai/powerword/cmd/powerword@latest

      - name: Run Linter
        run: make lint

  security-and-test:
    name: Security & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Dependency Tidy Hygiene
        run: make tidy && git diff --exit-code go.mod go.sum

      - name: Run Vulnerability Scan
        run: make vuln

      - name: Run Tests & Check Coverage
        run: make check-coverage

      - name: Compile Binary
        run: make build

