name: Go CI (Standalone)
# Reusable workflow for Go repos with no sibling replace directives.
# Usage in caller:
#   jobs:
#     ci:
#       uses: borch-ai/.github/.github/workflows/go-ci-standalone.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      coverage-threshold:
        description: "Minimum unit test coverage percentage (default: 91)"
        type: number
        default: 91

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    env:
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          ignore_paths: node_modules

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Hadolint
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              brackets: disable
              comments: disable

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate GitHub App Token
        # Skipped when secrets are unavailable (e.g. Dependabot PRs).
        # Repos that build the linter from source (e.g. powerword itself) do
        # not need this step — make lint runs `go run ./cmd/powerword lint-go`.
        if: env.CI_APP_ID != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure Git for Private Modules
        if: env.CI_APP_ID != ''
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install powerword
        if: env.CI_APP_ID != ''
        run: GOPRIVATE="github.com/borch-ai/*" go install github.com/borch-ai/powerword/cmd/powerword@latest

      - name: Run Linter
        run: make lint

  security-and-test:
    name: Security & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Dependency Tidy Hygiene
        run: make tidy && git diff --exit-code go.mod go.sum

      - name: Run Vulnerability Scan
        run: make vuln

      - name: Run Tests & Check Coverage
        run: make check-coverage

      - name: Compile Binary
        run: make build
