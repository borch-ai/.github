name: Bug Report
description: Report a bug or unexpected behavior in one of the borch-ai tools
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below as completely as possible so we can reproduce and fix the issue quickly.

  - type: dropdown
    id: repository
    attributes:
      label: Affected Repository
      description: Which borch-ai tool is affected?
      options:
        - kiln
        - pithos
        - aeolian
        - powerword
        - lighthouse
        - lamplighter
        - daedalus
        - Other / Multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run `make build`, the binary panics on startup with..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `...`
        2. Pass input `...`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, OS, and relevant tool versions.
      placeholder: |
        - Go: 1.24.x
        - OS: macOS 14 / Ubuntu 22.04
        - Tool version / commit SHA:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any logs, stack traces, or screenshots that may help.
    validations:
      required: false
